name: Signed Windows Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, and publish Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $expected = "v$((Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version)"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag ${{ github.ref_name }} does not match application version $expected"
          }

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Create release-specific self-signed certificate
        id: certificate
        shell: pwsh
        run: |
          $certificate = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject 'CN=Unifi Protect Viewer Community Release' `
            -FriendlyName 'Unifi Protect Viewer Community Release' `
            -KeyAlgorithm RSA `
            -KeyLength 3072 `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(1) `
            -CertStoreLocation Cert:\CurrentUser\My
          if (-not $certificate.HasPrivateKey) { throw 'Generated certificate has no private key.' }
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT

          $certificateDirectory = 'src-tauri/target/release/bundle'
          New-Item -ItemType Directory -Force -Path $certificateDirectory | Out-Null
          Export-Certificate -Cert $certificate -FilePath "$certificateDirectory/Unifi-Protect-Viewer-${{ github.ref_name }}.cer" | Out-Null
          @(
            'SELF-SIGNED COMMUNITY RELEASE CERTIFICATE'
            "SHA1 Thumbprint: $($certificate.Thumbprint)"
            "Subject: $($certificate.Subject)"
            "Valid From: $($certificate.NotBefore.ToUniversalTime().ToString('u'))"
            "Valid Until: $($certificate.NotAfter.ToUniversalTime().ToString('u'))"
            'This certificate does not establish a trusted publisher identity.'
          ) | Set-Content "$certificateDirectory/CERTIFICATE.txt" -Encoding ascii

      - name: Configure Tauri certificate thumbprint
        shell: pwsh
        env:
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          $path = 'src-tauri/tauri.conf.json'
          $config = Get-Content $path -Raw | ConvertFrom-Json
          $config.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $env:CERTIFICATE_THUMBPRINT -Force
          $config | ConvertTo-Json -Depth 20 | Set-Content $path -Encoding utf8

      - name: Build signed MSI and NSIS installers
        run: npm run build -- --bundles msi,nsis

      - name: Verify Authenticode signatures
        shell: pwsh
        env:
          EXPECTED_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $files) { throw 'No Windows installers were produced.' }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if (-not $signature.SignerCertificate) {
              throw "No Authenticode signature found on $($file.Name)"
            }
            if ($signature.SignerCertificate.Thumbprint -ne $env:EXPECTED_THUMBPRINT) {
              throw "Unexpected signing certificate on $($file.Name)"
            }
            if ($signature.Status -in 'NotSigned', 'HashMismatch') {
              throw "Invalid Authenticode signature on $($file.Name): $($signature.Status)"
            }
            Write-Host "Verified signature integrity for $($file.Name) - status $($signature.Status)"
          }

      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $output = 'src-tauri/target/release/bundle/SHA256SUMS.txt'
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            ForEach-Object { "$(Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName | Select-Object -ExpandProperty Hash)  $($_.Name)" } |
            Set-Content $output -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unifi-Protect-Viewer-Windows-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/*.cer
            src-tauri/target/release/bundle/CERTIFICATE.txt
            src-tauri/target/release/bundle/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Unifi Protect Viewer ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/*.cer
            src-tauri/target/release/bundle/CERTIFICATE.txt
            src-tauri/target/release/bundle/SHA256SUMS.txt

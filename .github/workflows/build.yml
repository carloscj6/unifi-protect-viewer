name: Signed Windows Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, and publish Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $expected = "v$((Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version)"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag ${{ github.ref_name }} does not match application version $expected"
          }

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Import Authenticode certificate
        id: certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            throw 'WINDOWS_CERTIFICATE secret is required and must contain the base64-encoded PFX.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw 'WINDOWS_CERTIFICATE_PASSWORD secret is required.'
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP 'windows-signing-certificate.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate.HasPrivateKey) { throw 'Imported certificate does not have a private key.' }
          if ($certificate.NotAfter -le (Get-Date)) { throw 'Code-signing certificate has expired.' }

          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
          Remove-Item -LiteralPath $pfxPath -Force

      - name: Configure Tauri certificate thumbprint
        shell: pwsh
        env:
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          $path = 'src-tauri/tauri.conf.json'
          $config = Get-Content $path -Raw | ConvertFrom-Json
          $config.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $env:CERTIFICATE_THUMBPRINT -Force
          $config | ConvertTo-Json -Depth 20 | Set-Content $path -Encoding utf8

      - name: Build signed MSI and NSIS installers
        run: npm run build -- --bundles msi,nsis

      - name: Verify Authenticode signatures
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $files) { throw 'No Windows installers were produced.' }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature on $($file.Name): $($signature.Status)"
            }
            Write-Host "Verified $($file.Name) - $($signature.SignerCertificate.Subject)"
          }

      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $output = 'src-tauri/target/release/bundle/SHA256SUMS.txt'
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            ForEach-Object { "$(Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName | Select-Object -ExpandProperty Hash)  $($_.Name)" } |
            Set-Content $output -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unifi-Protect-Viewer-Windows-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Unifi Protect Viewer ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/SHA256SUMS.txt
